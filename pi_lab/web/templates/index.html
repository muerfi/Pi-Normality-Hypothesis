<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>pi_lab Explorer</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <h1>pi_lab Explorer</h1>
    <p>Search for a digit sequence in the locally stored finite prefix of π.</p>

    <form method="POST">
        <label for="sequence">Enter digits:</label>
        <input
            type="text"
            id="sequence"
            name="sequence"
            value="{{ sequence or '' }}"
            pattern="[0-9]+"
            title="Digits only"
            required
        >
        <button type="submit">Search</button>
    </form>

    {% if result %}
        <p>{{ result }}</p>
    {% endif %}

    <p><a href="{{ url_for('frequency') }}">View digit frequency</a></p>
</body>
</html>
